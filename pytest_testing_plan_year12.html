
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.container { padding: 16px 0; }
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.filter-btn { padding: 4px 12px; border-radius: 20px; border: 1px solid var(--color-border-primary); background: var(--color-background-secondary); color: var(--color-text-secondary); font-size: 12px; cursor: pointer; transition: all .15s; }
.filter-btn.active { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.week-card { border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 10px; overflow: hidden; }
.week-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; background: var(--color-background-secondary); user-select: none; }
.week-header:hover { background: var(--color-background-tertiary); }
.week-num { font-size: 11px; color: var(--color-text-tertiary); min-width: 52px; }
.week-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
.chevron { font-size: 10px; color: var(--color-text-tertiary); transition: transform .2s; }
.week-card.open .chevron { transform: rotate(90deg); }
.week-body { display: none; padding: 12px 14px; border-top: 1px solid var(--color-border-tertiary); }
.week-card.open .week-body { display: block; }
.func-name { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-secondary); margin-bottom: 10px; }
.tier { margin-bottom: 10px; }
.tier-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
.tier-core .tier-label { color: var(--color-text-success); }
.tier-expected .tier-label { color: var(--color-text-info); }
.tier-stretch .tier-label { color: var(--color-text-warning); }
.test-list { list-style: none; }
.test-list li { font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-mono); padding: 2px 0; padding-left: 12px; position: relative; line-height: 1.5; }
.test-list li::before { content: ""; position: absolute; left: 0; top: 8px; width: 5px; height: 1px; background: var(--color-border-secondary); }
.tag { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 10px; margin-left: 6px; font-family: var(--font-sans); vertical-align: middle; }
.tag-raises { background: var(--color-background-warning); color: var(--color-text-warning); }
.tag-fixture { background: var(--color-background-info); color: var(--color-text-info); }
.tag-param { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 1px solid var(--color-border-secondary); }
</style>
<div class="container">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterAll()">All weeks</button>
    <button class="filter-btn" onclick="filterTag('raises')">pytest.raises</button>
    <button class="filter-btn" onclick="filterTag('fixture')">fixtures</button>
    <button class="filter-btn" onclick="filterTag('param')">parametrize</button>
  </div>
  <div id="weeks"></div>
</div>

function tagHTML(t) {
  if(t.includes('[raises]')) return '<span class="tag tag-raises">raises</span>';
  if(t.includes('[fixture]')) return '<span class="tag tag-fixture">fixture</span>';
  if(t.includes('[param]')) return '<span class="tag tag-param">parametrize</span>';
  return '';
}
function cleanTest(t) { return t.replace(/ \[.*?\]/g,''); }

function render(filtered) {
  const container = document.getElementById('weeks');
  container.innerHTML = '';
  weeks.forEach((w,i) => {
    if(filtered && !weekHasTag(w, filtered)) return;
    const card = document.createElement('div');
    card.className = 'week-card';
    card.innerHTML = `
      <div class="week-header" onclick="toggle(this)">
        <span class="week-num">${w.num}</span>
        <span class="week-title">${w.title}</span>
        <span class="chevron">▶</span>
      </div>
      <div class="week-body">
        <div class="func-name">source: ${w.fn}</div>
        <div class="tier tier-core">
          <div class="tier-label">Core</div>
          <ul class="test-list">${w.core.map(t=>`<li>${cleanTest(t)}${tagHTML(t)}</li>`).join('')}</ul>
        </div>
        <div class="tier tier-expected">
          <div class="tier-label">Expected</div>
          <ul class="test-list">${w.expected.map(t=>`<li>${cleanTest(t)}${tagHTML(t)}</li>`).join('')}</ul>
        </div>
        <div class="tier tier-stretch">
          <div class="tier-label">Stretch</div>
          <ul class="test-list">${w.stretch.map(t=>`<li>${cleanTest(t)}${tagHTML(t)}</li>`).join('')}</ul>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function weekHasTag(w, tag) {
  const all = [...w.core,...w.expected,...w.stretch].join(' ');
  return all.includes(`[${tag}]`);
}
function toggle(el) {
  el.parentElement.classList.toggle('open');
}
function filterAll() {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render(null);
}
function filterTag(tag) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render(tag);
}
render(null);
</script>
